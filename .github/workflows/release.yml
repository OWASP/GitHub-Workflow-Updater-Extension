name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Setup Node version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Run Tests
        run: npm run pretest && npm test
      - name: Set package.json version
        run: npm version ${{github.ref_name}} --no-git-tag-version
      - name: Create Changelog
        run: |
          git log $(git describe --tags --abbrev=0)..HEAD --oneline > CHANGELOG.txt
          cat CHANGELOG.txt
      - name: Set OpenVSX identity
        run: node scripts/patch-package-json.js publisher=OWASP-github-workflow-updater
      - name: Package Extension (OpenVSX)
        run: npx vsce package ${{github.ref_name}} --no-git-tag-version --no-update-package-json -o "OWASP-github-workflow-updater.github-workflow-updater-${{github.ref_name}}.vsix"
      - name: Publish to Open VSX Registry
        continue-on-error: false
        uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # tag v2.0.0
        with:
          preRelease: false
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: "OWASP-github-workflow-updater.github-workflow-updater-${{github.ref_name}}.vsix"
      - name: Set VS Code Marketplace identity
        run: node scripts/patch-package-json.js publisher=OWASP name=Github-Workflow-Updater-Extension 'displayName=OWASP GitHub Workflow Updater'

      - name: Package Extension (VS Code Marketplace)
        run: npx vsce package ${{github.ref_name}} --no-git-tag-version --no-update-package-json -o "OWASP.Github-Workflow-Updater-Extension-${{github.ref_name}}.vsix"
      - name: Publish to Visual Studio Marketplace
        run: npx vsce publish --packagePath "./OWASP.Github-Workflow-Updater-Extension-${{github.ref_name}}.vsix" --no-git-tag-version --no-update-package-json -p ${{ secrets.VSC_MKTP_PAT }}
